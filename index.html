<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>다산아트홀 실시간 예매 시스템</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>다산아트홀 좌석 예약</h1>
        
        <div class="legend">
            <span class="legend-item"><span class="box available"></span> 예매가능</span>
            <span class="legend-item"><span class="box selected"></span> 선택함</span>
            <span class="legend-item"><span class="box reserved"></span> 예매완료</span>
            <span class="legend-item"><span class="box wheelchair"></span> 장애인석</span>
        </div>

        <div class="form-section">
            <div class="input-group">
                <label for="name">이름</label>
                <input type="text" id="name" placeholder="홍길동" required>
            </div>
            <div class="input-group">
                <label for="phone">연락처</label>
                <input type="tel" id="phone" placeholder="010-1234-5678" required>
            </div>
            <div class="info-group">
                <p>선택한 좌석: <strong id="selectedSeatsDisplay">없음</strong></p>
                <p>총 예매 수량: <strong id="ticketCount">0</strong> / 5매</p>
            </div>
            <button id="submitBtn" class="btn-submit">예약 확정하기</button>
        </div>

        <hr>

        <div class="stage">STAGE (무대)</div>
        
        <div class="seating-container">
            <h3>[ 1 층 ]</h3>
            <div id="floor1" class="floor"></div>

            <h3 style="margin-top: 40px;">[ 2 층 ]</h3>
            <div id="floor2" class="floor"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
